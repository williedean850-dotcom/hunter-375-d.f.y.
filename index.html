<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hunter 375</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111; /* dark background */
      color: #fff;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      color: #0000ff; /* Hunter blue */
      text-shadow: 0 0 12px #0000ff, 0 0 24px #ff0000; /* blue glow with red outline */
    }

    .voice-btn {
      display: block;
      margin: 15px auto;
      padding: 12px 20px;
      background: #222;
      border: 2px solid #0000ff; /* blue border */
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 14px #0000ff; /* stronger blue glow */
    }

    .voice-btn:hover {
      background: #0000ff; /* blue when hovered */
      color: #000;
    }

    .security-btn {
      display: block;
      margin: 15px auto;
      padding: 12px 20px;
      background: #222;
      border: 2px solid #ff0000; /* red border */
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 14px #ff0000; /* stronger red glow */
    }

    .security-btn:hover {
      background: #00ff00; /* green when hovered */
      color: #000;
      border: 2px solid #00ff00;
      box-shadow: 0 0 14px #00ff00; /* stronger green glow */
    }

    .banner {
      font-size: 26px;
      font-weight: bold;
      margin: 20px;
      color: #0000ff; /* Hunter blue text */
      text-shadow: 0 0 12px #0000ff, 0 0 24px #ff0000; /* blue glow with red outline */
      letter-spacing: 2px; /* spaced out for bold look */
    }

    .page-frame {
      margin: 20px auto;
      padding: 20px;
      max-width: 600px;
      background: #333; /* dark steel background */
      border: 3px solid #888; /* metallic silver border */
      border-radius: 12px;
      box-shadow: 0 0 20px #0000ff, 0 0 30px #ff0000; /* blue + red glow */
    }

    .footer {
      font-size: 14px;
      text-align: center;
      margin-top: 20px;
      color: #ff0000; /* Hunter red text */
      text-shadow: 0 0 10px #0000ff, 0 0 20px #ff0000; /* blue + red glow */
    }
  </style>
</head>
<body>
  <div class="page-frame">
    <h1>Hunter 375</h1>
    <div class="banner">Hunter 375 D.F.Y. — Always ready to up</div>

    <button class="voice-btn">Voice Control</button>
    <button class="security-btn">Security Mode</button>

    <div class="footer">© 2026 Hunter 365 Project</div>
  </div>
</body>
</html>
