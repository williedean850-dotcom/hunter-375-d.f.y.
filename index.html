<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hunter 375</title> <!-- ✅ Fixed: now says Hunter 375 -->
  <style>
    /* (styles stay the same as before) */
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Chat Box -->
    <div class="chat-box">
      <div class="message">
        <img src="hunter_icon.png" alt="Hunter">
        <p><strong>Hunter:</strong> Hey, I’m Hunter. What do you want to work on today?</p>
      </div>
      <div class="message">
        <img src="user_icon.png" alt="User">
        <p><strong>User:</strong> I’m watching an online course and I’m stuck on something…</p>
      </div>
      <div class="message">
        <img src="hunter_icon.png" alt="Hunter">
        <p><strong>Hunter:</strong> Send me a screenshot or video. I’ll analyze it and walk you through it.</p>
      </div>
    </div>

    <!-- Right Work Box -->
    <div class="work-box" id="workBox">
      <p>Hunter’s Introduction Video and DFY work will appear here.</p>
      <div class="right-buttons">
        <button onclick="document.getElementById('workBox').innerHTML='<video src=\'intro.mp4\' controls></video>'">INTRODUCTION VIDEO</button>
        <button onclick="document.getElementById('workBox').innerHTML='<a href=\'hunter_output.zip\' download>Download Hunter Files</a>'">DOWNLOAD FILES</button>
      </div>
    </div>
  </div>

  <!-- Bottom Toolbar -->
  <div class="toolbar">
    <button>📎 Attach</button>
    <button>📷 Camera</button>
    <button>➡️ Send</button>
  </div>
</body>
</html>
